<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Staff Form</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>Staff Form</h1>
        <form th:action="@{/admin/users}" th:object="${staff}" method="post">
            <input type="hidden" th:field="*{id}" />
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" th:field="*{fullName}" required />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" th:field="*{email}" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" th:field="*{password}" />
            </div>
            <div class="form-group">
                <label>Role</label>
                <select class="form-control" th:field="*{role}">
                    <option value="Receptionist">Receptionist</option>
                    <option value="Restaurant Cashier">Restaurant Cashier</option>
                    <option value="Housekeeping">Housekeeping</option>
                    <option value="Chef">Chef</option>
                    <option value="Manager">Manager</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>
</body>
</html>
