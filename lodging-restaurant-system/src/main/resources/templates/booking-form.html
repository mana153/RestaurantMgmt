<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Book a Room</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>Book a Room</h1>
        <form th:action="@{/reservations}" th:object="${reservation}" method="post">
            <div class="form-group">
                <label>Room</label>
                <select class="form-control" th:field="*{room}">
                    <option th:each="room : ${rooms}" th:value="${room.id}" th:text="${room.roomNumber} + ' - ' + ${room.type}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Check-in Date</label>
                <input type="date" class="form-control" th:field="*{checkInDate}" required/>
            </div>
            <div class="form-group">
                <label>Check-out Date</label>
                <input type="date" class="form-control" th:field="*{checkOutDate}" required/>
            </div>
            <button type="submit" class="btn btn-primary">Book Now</button>
        </form>
    </div>
</div>
</body>
</html>
