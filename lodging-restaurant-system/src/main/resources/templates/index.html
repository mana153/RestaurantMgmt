<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>The Golden Spoon - Lodging & Restaurant</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .hero-banner {
            background: url('https://source.unsplash.com/1600x900/?hotel,lobby') no-repeat center center;
            background-size: cover;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .section {
            padding: 60px 0;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="#">The Golden Spoon</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" href="/login">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/signup">Sign Up</a>
            </li>
        </ul>
    </div>

<header class="hero-banner">

<div class="container">
    <section id="rooms" class="section">

        <div class="row">

    <section id="restaurant" class="section bg-light">

        <div class="row">
            </div>
    </section>

    <section id="offers" class="section">

        <div class="row">
            </div>
    </section>

    <section id="testimonials" class="section bg-light">

        <div class="row">
            </div>
    </section>
</div>

<footer class="section bg-dark text-white">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>Contact Us</h5>

                <p>Phone: (123) 456-7890</p>
            </div>
        </div>
