<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Occupancy Report</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>Occupancy Report</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Total Rooms</h5>
                        <p class="card-text" th:text="${#lists.size(rooms)}"></p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Occupied Rooms</h5>
                        <p class="card-text" th:text="${#lists.size(rooms.?[status == 'Occupied'])}"></p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Vacant Rooms</h5>
                        <p class="card-text" th:text="${#lists.size(rooms.?[status == 'Vacant'])}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
