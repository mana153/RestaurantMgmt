<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Restaurant Management</title>


    <link rel="stylesheet" href="/css/restaurants.css">
    <link rel="stylesheet" href="/css/navbar.css">

</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container">

    <h1>Restaurant Management</h1>

    <form action="/saveRestaurant" method="post">

        <input type="text"
               name="name"
               placeholder="Restaurant Name"
               required>

        <input type="text"
               name="cuisine"
               placeholder="Cuisine"
               required>

        <input type="number"
               step="0.1"
               name="rating"
               placeholder="Rating"
               required>

        <button type="submit">
            Add Restaurant
        </button>

    </form>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Cuisine</th>
            <th>Rating</th>
            <th>Action</th>
        </tr>

        <tr th:each="r : ${restaurants}">

            <td th:text="${r.id}"></td>
            <td th:text="${r.name}"></td>
            <td th:text="${r.cuisine}"></td>
            <td th:text="${r.rating}"></td>

            <td>

                <a th:href="@{'/editRestaurant/' + ${r.id}}">
                    Edit
                </a>
                |
                <a th:href="@{'/deleteRestaurant/' + ${r.id}}">
                    Delete
                </a>
            </td>

        </tr>

    </table>

</div>

</body>

</html>
