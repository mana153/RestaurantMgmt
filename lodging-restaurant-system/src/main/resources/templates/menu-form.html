<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Menu Item Form</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>Menu Item Form</h1>
        <form th:action="@{/menu-items}" th:object="${menuItem}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <div class="form-group">
                <label>Name</label>
                <input type="text" class="form-control" th:field="*{name}" required/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" class="form-control" th:field="*{description}"/>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}" required/>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" class="form-control" th:field="*{category}" required/>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>
</body>
</html>
