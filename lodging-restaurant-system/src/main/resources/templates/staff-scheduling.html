<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Staff Scheduling</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>Staff Scheduling</h1>
        <div class="row">
            <div class="col-md-8">
                <h2>Current Schedule</h2>
                <table class="table">
                    <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Role</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${shifts}">
                        <td th:text="${s.staff.fullName}"></td>
                        <td th:text="${s.role}"></td>
                        <td th:text="${#temporals.format(s.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${#temporals.format(s.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <a th:href="@{/manager/scheduling/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="col-md-4">
                <h2>Add Shift</h2>
                <form th:action="@{/manager/scheduling}" th:object="${shift}" method="post">
                    <div class="form-group">
                        <label>Staff</label>
                        <select class="form-control" th:field="*{staff}">
                            <option th:each="st : ${staff}" th:value="${st.id}" th:text="${st.fullName}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" class="form-control" th:field="*{role}" required />
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="datetime-local" class="form-control" th:field="*{startTime}" required />
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="datetime-local" class="form-control" th:field="*{endTime}" required />
                    </div>
                    <button type="submit" class="btn btn-primary">Add Shift</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
