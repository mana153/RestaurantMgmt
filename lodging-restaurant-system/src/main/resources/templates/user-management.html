<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>User Management</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <h1>User Management</h1>
        <a href="/admin/users/new" class="btn btn-primary mb-3">Add New Staff</a>
        <table class="table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${staff}">
                <td th:text="${s.fullName}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.role}"></td>
                <td>
                    <a th:href="@{/admin/users/edit/{id}(id=${s.id})}" class="btn btn-sm btn-info">Edit</a>
                    <a th:href="@{/admin/users/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
