<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    
    <div style="max-width: 750px; margin: 0 auto;">
        
        <!-- Back Link Navigation -->
        <a th:href="@{/menu}" style="display: inline-flex; align-items: center; gap: 8px; font-weight: 500; font-size: 0.85rem; margin-bottom: 2rem;">
            <i class="fa-solid fa-arrow-left"></i> Return to Culinary Menu
        </a>

        <!-- Master Luxury Form Card -->
        <div class="luxe-card">
            
            <div class="luxe-card-header">
                <h2 class="luxe-card-title">
                    <i class="fa-solid fa-bell-concierge" style="color: var(--color-gold); margin-right: 12px;"></i>
                    <span th:text="${menuItem.id != null ? 'Refine Culinary Creation' : 'Create Culinary Masterpiece'}">Create Masterpiece</span>
                </h2>
                <span class="badge-luxury">Gourmet Selection</span>
            </div>

            <!-- Form Body -->
            <form th:action="${formAction}" th:object="${menuItem}" method="post">
                
                <!-- Explicitly bind ID if in Edit Mode -->
                <input type="hidden" th:field="*{id}" />

                <div class="api-stats-grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    
                    <!-- Input 1: Dish Name -->
                    <div class="luxe-form-group" style="margin-bottom: 0;">
                        <label class="luxe-form-label" for="name">Culinary Name</label>
                        <input type="text" 
                               id="name" 
                               th:field="*{name}" 
                               class="luxe-form-control" 
                               placeholder="e.g. Saffron Truffle Tagliolini" 
                               required />
                    </div>

                    <!-- Input 2: Price -->
                    <div class="luxe-form-group" style="margin-bottom: 0;">
                        <label class="luxe-form-label" for="price">Price (INR ₹)</label>
                        <input type="number" 
                               step="0.01" 
                               id="price" 
                               th:field="*{price}" 
                               class="luxe-form-control" 
                               placeholder="e.g. 1250.00" 
                               min="0" 
                               required />
                    </div>
                </div>

                <div class="api-stats-grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    
                    <!-- Input 3: Category Select -->
                    <div class="luxe-form-group" style="margin-bottom: 0;">
                        <label class="luxe-form-label" for="category">Culinary Category</label>
                        <select id="category" th:field="*{category}" class="luxe-form-control" required>
                            <option value="STARTER">Exquisite Starter</option>
                            <option value="MAIN_COURSE">Signature Main Course</option>
                            <option value="DESSERT">Sweet Confection</option>
                            <option value="BEVERAGE">Artisan Elixir</option>
                        </select>
                    </div>

                    <!-- Input 4: Simulated Image Reference -->
                    <div class="luxe-form-group" style="margin-bottom: 0;">
                        <label class="luxe-form-label" for="imageUrl">Simulated Asset Name</label>
                        <input type="text" 
                               id="imageUrl" 
                               th:field="*{imageUrl}" 
                               class="luxe-form-control" 
                               placeholder="e.g. truffle_pasta.jpg" />
                    </div>
                </div>

                <!-- Input 5: Gourmet Description -->
                <div class="luxe-form-group">
                    <label class="luxe-form-label" for="description">Gourmet Description & Sensory Notes</label>
                    <textarea id="description" 
                              th:field="*{description}" 
                              class="luxe-form-control" 
                              rows="4" 
                              placeholder="Describe the texture, taste profile, ingredients, and presentation..." 
                              required></textarea>
                </div>

                <!-- Input 6: Available Toggle -->
                <div class="luxe-form-group" style="margin-top: 2rem; margin-bottom: 2.5rem;">
                    <label class="luxe-form-checkbox">
                        <input type="checkbox" th:field="*{available}" />
                        <span>Active and Available in Culinary Kitchen</span>
                    </label>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-left: 28px; margin-top: 5px;">
                        Checking this makes the dish immediately available for lodging guests' room service and third-party APIs (Zomato/Swiggy).
                    </p>
                </div>

                <!-- Form Controls Footer -->
                <div style="display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid var(--border-light); padding-top: 2rem;">
                    <a th:href="@{/menu}" class="btn-outline">Cancel</a>
                    <button type="submit" class="btn-gold">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Save Masterpiece
                    </button>
                </div>

            </form>
            
        </div>
        
    </div>

</section>
</body>
</html>
